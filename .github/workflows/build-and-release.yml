name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Download MTG Rules
      run: |
        curl -L "https://media.wizards.com/2025/downloads/MagicCompRules%2020251114.txt" -o MtgRules/Rules.txt
        echo "Downloaded rules file:"
        head -5 MtgRules/Rules.txt

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      run: dotnet publish MtgRules/MtgRules.csproj -c Release -o publish

    - name: Create archive
      run: |
        cd publish
        zip -r ../MtgRules.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MtgRules
        path: MtgRules.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: MtgRules.zip
        generate_release_notes: true
